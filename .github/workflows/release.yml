name: Build and Release Wheels

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-wasm-wheels:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest
          cache: true

      - name: Build WebAssembly Wheel
        run: |
          rm -rf build dist mahotas.egg-info .pixi
          pixi run build-wasm

      - name: Generate Forced 4_0_9 Tag
        run: |
          # Reclaim ownership from Docker's root user
          sudo chown -R $USER:$USER dist
          
          cd dist
          WHEEL=$(ls *.whl | grep "pyemscripten" | head -n 1)
          if [ -n "$WHEEL" ]; then
            FORCED_WHEEL=$(echo $WHEEL | sed 's/pyemscripten_[0-9]\{4\}_[0-9]/emscripten_4_0_9/')
            cp "$WHEEL" "$FORCED_WHEEL"
          fi

      - name: Test WebAssembly Wheel
        run: pixi run test-wasm

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          generate_release_notes: true