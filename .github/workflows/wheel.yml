name: Build wheel and sdist

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
      - master
      - build_wheel
  pull_request:

concurrency:
  group: wheel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  make_sdist:
    name: Make SDist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Build SDist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-13, macos-14]

    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all
      - name: Build wheels
        uses: pypa/cibuildwheel@v2.19.2
        env:
          # 1. SKIP all PyPy (pp*) and old CPython (cp36-38)
          # This ensures we only build for standard Python 3.9, 3.10, 3.11, 3.12, 3.13
          CIBW_SKIP: "pp* cp36-* cp37-* cp38-*"
          
          # 2. Keep your test configuration
          CIBW_TEST_REQUIRES: "pytest numpy~=2.1 scipy pillow"
          CIBW_TEST_COMMAND: "pytest -v --pyargs mahotas.tests"
          
          # 3. Optimization: Only build for the most common 64-bit architectures
          # This prevents CI from wasting time on 32-bit or older specialized builds
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_ARCHS_MACOS: "x86_64 arm64"
          CIBW_ARCHS_WINDOWS: "AMD64"
      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl