name: Build wheel and sdist

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
      - master
      - build_wheel
  pull_request:

concurrency:
  group: wheel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  make_sdist:
    name: Make SDist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Build SDist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-13, macos-14]

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.19.2
        env:
          # 1. Skip older Python versions (CPython 3.6, 3.7, 3.8)
          CIBW_SKIP: "cp36-* cp37-* cp38-* pp37-* pp38-* pp39-*"
          
          # 2. Tell cibuildwheel what dependencies are needed for the tests
          CIBW_TEST_REQUIRES: "pytest numpy scipy pillow"
          
          # 3. The "Step Away" magic command. 
          # cibuildwheel automatically runs this in a temp directory,
          # so --pyargs ensures it tests the INSTALLED wheel.
          CIBW_TEST_COMMAND: "pytest -v --pyargs mahotas.tests"

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl