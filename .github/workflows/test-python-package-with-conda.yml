name: Test mahotas

on: [push]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - '3.8'
          - '3.9'
          - '3.10'
          - '3.11'
          - '3.12'
          - '3.13'
        numpy-version:
          - '1.19'
          - '1.20'
          - '1.21'
          - '1.22'
          - '1.23'
          - '1.24'
          - '1.25'
          - '1.26'
          - '2.0'
          - '2.1'
          - '2.2'
        exclude:
            # --- Python 3.8 Exclusions ---
            - python-version: '3.8'
              numpy-version: '1.19'
            - python-version: '3.8'
              numpy-version: '1.22'
            - python-version: '3.8'
              numpy-version: '1.25'
            - python-version: '3.8'
              numpy-version: '1.26'
            - python-version: '3.8'
              numpy-version: '2.0'
            - python-version: '3.8'
              numpy-version: '2.1'
            - python-version: '3.8'
              numpy-version: '2.2'

            # --- Python 3.9 Exclusions ---
            - python-version: '3.9'
              numpy-version: '1.19'
            - python-version: '3.9'
              numpy-version: '2.0'
            - python-version: '3.9'
              numpy-version: '2.1'
            - python-version: '3.9'
              numpy-version: '2.2'

            # --- Python 3.10 Exclusions ---
            - python-version: '3.10'
              numpy-version: '1.19'
            - python-version: '3.10'
              numpy-version: '1.20'

            # --- Python 3.11 Exclusions ---
            - python-version: '3.11'
              numpy-version: '1.19'
            - python-version: '3.11'
              numpy-version: '1.20'
            - python-version: '3.11'
              numpy-version: '1.21'
            - python-version: '3.11'
              numpy-version: '1.22'

            # --- Python 3.12 Exclusions ---
            - python-version: '3.12'
              numpy-version: '1.19'
            - python-version: '3.12'
              numpy-version: '1.20'
            - python-version: '3.12'
              numpy-version: '1.21'
            - python-version: '3.12'
              numpy-version: '1.22'
            - python-version: '3.12'
              numpy-version: '1.23'
            - python-version: '3.12'
              numpy-version: '1.24'
            - python-version: '3.12'
              numpy-version: '1.25'

            # --- Python 3.13 Exclusions (Requires NumPy 2.1+) ---
            - python-version: '3.13'
              numpy-version: '1.19'
            - python-version: '3.13'
              numpy-version: '1.20'
            - python-version: '3.13'
              numpy-version: '1.21'
            - python-version: '3.13'
              numpy-version: '1.22'
            - python-version: '3.13'
              numpy-version: '1.23'
            - python-version: '3.13'
              numpy-version: '1.24'
            - python-version: '3.13'
              numpy-version: '1.25'
            - python-version: '3.13'
              numpy-version: '1.26'
            - python-version: '3.13'
              numpy-version: '2.0' 

    steps:
    - uses: actions/checkout@v4

    - uses: mamba-org/setup-micromamba@v1
      with:
        cache-environment: true
        cache-downloads: false
        environment-name: mahotas_test_env
        create-args: python=${{ matrix.python-version }} numpy=${{ matrix.numpy-version }}

    - name: Install dependencies
      shell: bash -l {0}
      run: |
        # Explicitly install build tools (required for Python 3.13)
        micromamba install --name mahotas_test_env setuptools wheel cython
        # Install remaining test requirements
        micromamba install --file tests-requirements.txt --name mahotas_test_env
        micromamba install --name mahotas_test_env freeimage imread

    - name: Install mahotas
      shell: bash -l {0}
      run: |
        # Build and install the package into the current environment
        pip install .

    - name: Test with pytest
      shell: bash -l {0}
      run: |
        # Move away from the source folder to ensure we test the installed binaries
        mkdir test_run
        cd test_run
        # Run the tests from the installed package
        pytest -v --pyargs mahotas.tests