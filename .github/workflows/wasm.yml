name: Build Pyodide Wheel

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build-and-test-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest
          cache: true

      - name: Build WebAssembly Wheel
        run: |
          # Ensure a clean slate for the C-extensions
          rm -rf build dist mahotas.egg-info .pixi
          pixi run build-wasm

      - name: Generate Forced 4_0_9 Tag
        run: |
          cd dist
          WHEEL=$(ls *.whl | grep "pyemscripten" | head -n 1)
          if [ -n "$WHEEL" ]; then
            # Replaces modern pyemscripten_YYYY_N with emscripten_4_0_9
            FORCED_WHEEL=$(echo $WHEEL | sed 's/pyemscripten_[0-9]\{4\}_[0-9]/emscripten_4_0_9/')
            cp "$WHEEL" "$FORCED_WHEEL"
            echo "Created legacy wheel: $FORCED_WHEEL"
          fi

      - name: Test WebAssembly Wheel
        run: pixi run test-wasm

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mahotas-pyodide-wheels-all-tags
          path: dist/*.whl